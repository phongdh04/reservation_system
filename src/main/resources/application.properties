spring.application.name=qlnh

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3309/qlnh_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=qlnh_user
spring.datasource.password=qlnh_password_456
spring.datasource.hikari.maximum-pool-size=50

# JPA / Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Server
server.port=8080

# JWT
app.jwtSecret=MySuperSecretKeyForJWT123!@#4567890abcdefghijklmnopqrstuvwxyz
app.jwtExpirationMs=86400000

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6381
spring.data.redis.password=qlnh_redis_password_123
spring.data.redis.lettuce.pool.max-active=100

# Email SMTP
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_EMAIL@gmail.com
spring.mail.password=YOUR_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Frontend URL (for email links)
app.frontend.url=http://localhost:5173

# Logging
logging.level.org.springframework.security=WARN
logging.level.com.example.qlnh=INFO
